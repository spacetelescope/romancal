# https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/syntax-for-issue-forms
name: pipeline build delivery request
description: request a pipeline build and delivery
title: "[BUILD DELIVERY REQUEST] <insert build name here>"
assignees:
  - zacharyburnett
  - jhunkeler
body:
  - type: input
    id: build
    attributes:
      label: What is the name of this build?
      description: Copy this to the issue title as well.
      placeholder: 26Q3_B22.1
    validations:
      required: true
  - type: input
    id: crds_context
    attributes:
      label: Which CRDS context should this build use?
      placeholder: roman_0051.pmap
    validations:
      required: true
  - type: input
    id: base
    attributes:
      label: Which revision should this build be based on?
      description: If this is a patch, enter the previously-released tag that this should be based on here.
      placeholder: main
      value: main
    validations:
      required: true
  - type: textarea
    id: patches
    attributes:
      label: IF THIS IS A PATCH ON AN EXISTING RELEASE, which changes should be included?
      description: Include milestone(s), pull request URL(s), and / or specific commit hash(es) to duplicate onto the base revision from the previous question.
      placeholder: |
        milestone(s)
        pull request URL(s)
        specific commit hash(es)
  - type: checkboxes
    id: is_release_candidate
    attributes:
      label: Release Candidate?
      options:
        - label: Is this a release candidate (NOT to be published to PyPI)?
  - type: textarea
    id: release_notes
    attributes:
      label: Optionally, include release notes for the GitHub release.
      placeholder: Leaving this blank indicates that we should use the entry from `CHANGES.rst`.
  - type: checkboxes
    id: maintainer_understands_okify
    attributes:
      label: Maintainer Should Okify
      options:
        - label: I understand that a pipeline maintainer should handle okifying any newly-created truth file directory for this build.
          required: true
  - type: textarea
    id: process
    attributes:
      label: Release Procedure
      description: these are the steps that will be undertaken to perform this release, build, and delivery; please don't modify this unless you know what you're doing
      value: |
        - [ ] set the corresponding build milestone for this issue (create it if it doesn't exist)
        - [ ] add a comment pinging @stscijgbot-rstdms to track this as an RCAL ticket on Jira

        #### freeze and tag code
        - [ ] Release new versions of STScI-developed dependencies (`stcal`, `stpipe`, etc.) if they introduce new bugfixes or features required by the pipeline.
        - [ ] Ensure pipeline dependencies in `pyproject.toml` are **NOT** floating on `main` (e.g. `stcal@git+https://github.com/spacetelescope/stcal.git@main`), and instead use PyPI releases (e.g. `stcal>=1.19,<2`) instead (or, at the very least, point to a specific commit hash). The lower pin does **not necessarily need to be the latest release**, but rather is based on features / fixes **required by the pipeline code**.
        - [ ] add a new line to [the `DMS Operational Build Versions` table in `README.md`](https://github.com/spacetelescope/romancal#dms-operational-build-versions)
        - [ ] IF NOT A PATCH ON AN EXISTING RELEASE, generate new MOC and `roman-data-workshop` files:
          - [ ] run https://github.com/spacetelescope/RegressionTests/actions/workflows/romancal_regtest_gen.yml with:
            - `artifactory_truth_directory` set to `<BUILDNAME>`
            - `romanisim_script` set to `romancal_make_l1_data_files.sh`
            - `romancal_script` set to `make_moc_rdw_files.sh`
          - [ ] notify MOC of new files
          - [ ] update https://github.com/spacetelescope/roman-data-workshop to point to newly-generated `roman-data-workshop` files
        - [ ] Determine the new `<VERSION>`:
          - if breaking changes are present (`changes/*.breaking.rst`) increment the major version (`1.1.3` -> `2.0.0`),
          - else if new features are present increment the minor version (`1.1.3` -> `1.2.0`),
          - else if only bugfixes are present increment the patch version (`1.1.3` -> `1.1.4`).
          - If this is a release candidate (indicated above), add an `rc1`, or `rc2`, etc. to the end of the version.
        - [ ] Switch to the release branch corresponding to the minor version, with the micro release as `x` (`1.1.3` -> `release/1.1.x`).
        - [ ] IF THIS IS A PATCH ON AN EXISTING RELEASE, duplicate the desired changes (indicated above), onto the desired base revision (indicated above).
        - [ ] Run `towncrier build --version <VERSION>` to consume fragments in `changes/` into a new entry in `CHANGES.rst`.
        - [ ] Tag the head of the release branch with `<VERSION>`; if this is NOT a patch release (non-diverging branches), ensure the `main` branch is up-to-date with the latest commit on the release branch.

        #### run "canonical" regression test for metrics dashboard
        - [ ] On Artifactory (https://bytesalad.stsci.edu), copy a truth file directory to `roman-pipeline/build/<BUILDNAME>` in order to freeze them. IF THIS IS A PATCH RELEASE it will be the previous build directory `roman-pipeline/build/<PREVIOUSBUILDNAME>` -> `roman-pipeline/build/<BUILDNAME>`; otherwise simply copy `roman-pipeline/dev` -> `roman-pipeline/build/<BUILDNAME>`.
        - [ ] [Run a regression test](https://github.com/spacetelescope/RegressionTests/actions/workflows/romancal.yml) with the following parameters, and attach the URL to this issue as a comment:
          - `git branch / ref`: the `<VERSION>` tag you just made, e.g. `1.0.1`
          - `Artifactory truth directory`: the truth directory you just copied, e.g. `roman-pipeline/build/26Q3_B22.1`
          - `INT build directory to also upload results to`: the build name, e.g. `26Q3_B22.1`
        - [ ] Okify any failures for this regression test run with `okify_regtests roman <RUN_NUMBER>`. This should be done by a pipeline maintainer.

        #### publish release and deliver frozen environment
        - [ ] IF NOT A RELEASE CANDIDATE (indicated above), publish a GitHub release for the new version at the tag you just made, using the release notes provided above.
        - [ ] Write a [`stasis` INI delivery configuration](https://github.com/spacetelescope/stasis#step-2-create-a-delivery-configuration) at a publicly accessible URL, e.g. `/eng/ssb/websites/ssbpublic/zburnett/ROMANDP-1.0.1-1.ini` pointing to `romancal[sdp]=1.0.1`
        - [ ] [Run `stasis`](https://github.com/spacetelescope/datapipeline-workflows/actions/workflows/stasis_public.yml), pointing `path to stasis input file (.ini)` to the URL of the delivery configuration you just wrote.
